<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sitemap — scottj.info</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf8f4;
      --text: #151513;
      --accent: #2956c1;
      --border: #dbd6cc;
      --card: #fff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1917;
        --text: #e8e6e1;
        --accent: #5b9fd4;
        --border: #2e2d29;
        --card: #232220;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    main {
      max-width: 640px;
      width: 100%;
      padding: clamp(2rem, 5vw, 6rem);
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    ul {
      list-style: none;
    }
    li + li {
      margin-top: 0.75rem;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sitemap</h1>
    <ul id="urls"></ul>
  </main>
  <script type="module">
    const SITEMAP_NS = 'http://www.sitemaps.org/schemas/sitemap/0.9';
    const res = await fetch('sitemap.xml');
    const xml = new DOMParser().parseFromString(await res.text(), 'application/xml');
    const list = document.getElementById('urls');
    for (const url of xml.getElementsByTagNameNS(SITEMAP_NS, 'url')) {
      const loc = url.getElementsByTagNameNS(SITEMAP_NS, 'loc')[0]?.textContent?.trim();
      if (!loc) continue;
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = loc;
      a.textContent = loc;
      li.appendChild(a);
      list.appendChild(li);
    }
  </script>
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "afb08e5a4f494fe78662f8696341892e"}'></script>
</body>
</html>
